name: mint-backend

services:
  api:
    image: mint-api:1.0.0
    ports:
      - "8080:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Dspring.config.location=classpath:/,/app/config/"
    volumes:
      - ./app/config:/app/config
    build:
      context: ./
      tags:
        - mint-api:1.0.0
    depends_on:
      - redis
    networks:
      mint-net:
    restart:
      unless-stopped

  redis:
    image: redis:7-alpine
    command: [ "redis-server", "--save", "60", "1", "--loglevel", "warning" ]
    volumes:
      - mint-redis:/data
    networks:
      mint-net:
    restart:
      unless-stopped

volumes:
  mint-redis:
networks:
  mint-net: