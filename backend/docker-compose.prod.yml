name: mint-backend

services:
  api:
    image: mint-api:1.0.0
    ports:
      - "80:8080"
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Dspring.config.location=classpath:/,/app/config/
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+UseContainerSupport
        -XX:+UseG1GC
    volumes:
      - /app/config:/app/config
    build:
      context: ./
      tags:
        - mint-api:1.0.0
    depends_on:
      - redis
    networks:
      mint-net:
    restart:
      unless-stopped
    deploy:
      resources:
        limits:
          memory: 1800m

  redis:
    image: redis:7-alpine
    command: [ "redis-server", "--save", "60", "1", "--maxmemory", "200mb",
               "--maxmemory-policy", "allkeys-lru" ]
    volumes:
      - mint-redis:/data
    networks:
      mint-net:
    restart:
      unless-stopped
    deploy:
      resources:
        limits:
          memory: 200m

volumes:
  mint-redis:
networks:
  mint-net:
